<div class="child-content">
    <h4>📥 Data Receiver</h4>

    <div class="data-grid">
        <div class="data-item" [class.highlight]="type() === 'param'"
            style="background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.3);">
            <span class="label" style="color: #4ade80">PARAM (SUBSCRIBE)</span>
            <span class="value" style="color: #4ade80">{{ id() || '---' }}</span>
        </div>
        <div class="data-item" [class.highlight]="type() === 'param'"
            style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3);">
            <span class="label" style="color: #f87171">PARAM (SNAPSHOT)</span>
            <span class="value" style="color: #f87171">{{ snapshotId() || '---' }}</span>
        </div>
        <div class="data-item" [class.highlight]="type() === 'query'">
            <span class="label">QUERY</span>
            <span class="value">{{ query() || '---' }}</span>
        </div>
        <div class="data-item" [class.highlight]="type() === 'state'">
            <span class="label">STATE</span>
            <span class="value">{{ stateData() || '---' }}</span>
        </div>
    </div>

    <div class="sync-status" *ngIf="type()">
        <span class="pulse"></span> Active Capture: {{ type()?.toUpperCase() }}
    </div>
</div>
